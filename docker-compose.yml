services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scoutdocmgr}
      POSTGRES_USER: ${POSTGRES_USER:-scout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scout}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scout}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-scoutdocmgr}
      CORS_ORIGINS: http://${TRUENAS_IP:-192.168.10.181}:3003
      OPENSIGN_ENABLED: ${OPENSIGN_ENABLED:-false}
      OPENSIGN_URL: ${OPENSIGN_URL:-}
      OPENSIGN_APP_ID: ${OPENSIGN_APP_ID:-}
      OPENSIGN_API_KEY: ${OPENSIGN_API_KEY:-}
      OPENSIGN_FOLDER_ID: ${OPENSIGN_FOLDER_ID:-}
      PORTAL_AUTH_ENABLED: ${PORTAL_AUTH_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      PDF_DIR: /data/pdfs
    volumes:
      - pdf_data:/data/pdfs
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3003:3003"
    depends_on:
      - backend

volumes:
  db_data:
  pdf_data:
